name: Test Raft

on:
  push:
    branches: ["main"]
    paths:
      - "raft/**"
      - "remote/**"
  pull_request:
    branches: ["main"]
    paths:
      - "raft/**"
      - "remote/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go test -v -timeout 600s -race ./...
        working-directory: raft

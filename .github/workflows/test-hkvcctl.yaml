name: Test hkvcctl

on:
  push:
    branches: ["main"]
    paths:
      - "hkvcctl/**"
  pull_request:
    branches: ["main"]
    paths:
      - "hkvcctl/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go test -v -timeout 60s -race ./...
        working-directory: hkvcctl
